name: Test

# Runs on every push/PR AND is called by the release workflow as a gate, so a
# broken commit can never ship installers.
on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Version files are in sync
        run: node scripts/sync-version.mjs --check

      - name: Backend install + tests
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          npm test

      - name: Frontend install + production build
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npx next build
