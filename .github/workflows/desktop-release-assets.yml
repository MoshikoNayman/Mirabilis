name: Desktop Release Assets

on:
  push:
    tags:
      - '26.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload
        required: true
        type: string

permissions:
  contents: write

# Don't let a re-tag or a manual dispatch race another run for the same release.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Gate: backend tests + frontend build + version-sync check must pass before we
  # build or upload any installer. A tag on a broken commit now fails here.
  test:
    uses: ./.github/workflows/test.yml

  macos:
    needs: test
    runs-on: macos-14
    env:
      RELEASE_REF: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build macOS DMG
        run: |
          chmod +x desktop/build.sh
          cd desktop
          ./build.sh dmg

      - name: Generate checksums
        run: |
          cd desktop/dist
          shasum -a 256 *.dmg > SHA256SUMS-macos.txt
          cat SHA256SUMS-macos.txt

      - name: Upload macOS assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.blockmap
            desktop/dist/SHA256SUMS-macos.txt

  windows:
    needs: test
    runs-on: windows-2022
    env:
      RELEASE_REF: ${{ github.event.inputs.tag || github.ref_name }}
      CI: true
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build Windows installer
        shell: cmd
        run: |
          cd desktop
          call build.bat

      - name: Generate checksums
        shell: pwsh
        run: |
          cd desktop/dist
          Get-FileHash *.exe -Algorithm SHA256 | ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) } | Out-File -Encoding ascii SHA256SUMS-windows.txt
          Get-Content SHA256SUMS-windows.txt

      - name: Upload Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          files: |
            desktop/dist/*.exe
            desktop/dist/latest*.yml
            desktop/dist/*.blockmap
            desktop/dist/SHA256SUMS-windows.txt

  linux:
    needs: test
    runs-on: ubuntu-22.04
    env:
      RELEASE_REF: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build Linux AppImage
        run: |
          chmod +x desktop/build.sh
          cd desktop
          ./build.sh appimage

      - name: Generate checksums
        run: |
          cd desktop/dist
          sha256sum *.AppImage > SHA256SUMS-linux.txt
          cat SHA256SUMS-linux.txt

      - name: Upload Linux assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          files: |
            desktop/dist/*.AppImage
            desktop/dist/latest*.yml
            desktop/dist/SHA256SUMS-linux.txt
